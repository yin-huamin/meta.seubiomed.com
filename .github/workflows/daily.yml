name: 每日自动更新

on:
  schedule:
    # 北京时间每天 20:00 = UTC 12:00
    - cron: '0 12 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 创建配置文件
        run: |
          cat > config.env << 'CONFIGEOF'
          # Auto-generated by GitHub Actions
          LLM_API_URL=${{ secrets.LLM_API_URL }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          NCBI_API_KEY=${{ secrets.NCBI_API_KEY }}
          SEARCH_KEYWORDS=${{ secrets.SEARCH_KEYWORDS }}
          LLM_TIMEOUT=60
          LLM_DELAY=1.5
          CONFIGEOF

      - name: 创建目录
        run: |
          mkdir -p data/daily logs

      - name: 运行每日更新
        run: |
          # 覆盖模式：只保留本次运行日志
          python metaweb.py daily 2>&1 | tee logs/daily.log

      - name: 生成网页数据
        run: |
          python metaweb.py build 2>&1 | tee -a logs/daily.log

      - name: 提交更新到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 强制添加被 gitignore 的数据文件和日志
          git add --force \
            data/daily/ \
            logs/daily.log \
            web/data.json \
            web/data/ \
            web/memory.json \
            web/stats.json
          # 有变动才提交
          git diff --cached --quiet || \
            git commit -m "chore: 每日更新 $(date '+%Y-%m-%d %H:%M')"

      - name: 推送更新
        run: git push
